name: Update Stock Data

on:
  # 매주 일요일 18:00 UTC = 월요일 03:00 KST
  schedule:
    - cron: "0 18 * * 0"

  # 수동 실행 가능 (테스트용)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd scripts
          pip install -r requirements.txt

      - name: Process ticker requests
        continue-on-error: true
        env:
          GOOGLE_SHEETS_REQUEST_CSV_URL: ${{ secrets.GOOGLE_SHEETS_REQUEST_CSV_URL }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
          GOOGLE_SHEETS_UPDATE_TOKEN: ${{ secrets.GOOGLE_SHEETS_UPDATE_TOKEN }}
        run: |
          cd scripts
          python process_requests.py

      - name: Fetch latest data (full stage)
        run: |
          cd scripts
          python fetch_data.py --stage full --force

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/ scripts/tickers.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ scripts/tickers.json
          git commit -m "chore: 주간 데이터 자동 갱신 ($(date -u +'%Y-%m-%d'))"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push origin HEAD:"${GITHUB_REF_NAME:-main}"
